# Dependabot configuration
#
# - Minor/patch: agrupados em uma PR por ecossistema; auto-merge quando CI passar.
# - Dependabot atualiza a mesma PR (novos commits na branch), não abre nova.
#
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # ── Python (pip) ───────────────────────────────────────────────────────────
  # Minor/patch em uma única PR; label "automerge" para merge automático após CI.
  - package-ecosystem: "pip"
    directory: "/backend"
    target-branch: "homolog"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "python"
      - "automerge"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ── Docker (base image) ────────────────────────────────────────────────────
  # Todas as atualizações em uma única PR.
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "homolog"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 1
    groups:
      docker-all:
        update-types:
          - "major"
          - "minor"
          - "patch"

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  # Todas as atualizações em uma única PR; validação na própria PR via CI.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "homolog"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 1
    groups:
      actions-all:
        update-types:
          - "major"
          - "minor"
          - "patch"
