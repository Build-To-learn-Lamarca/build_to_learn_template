name: Build, Scan & Publish

# Triggered only after a PR is merged into main.
# Flow: construct Dockerfile → build image → Trivy vulnerability scan → push to Docker Hub → deploy (SSH).
# The push is BLOCKED if Trivy finds CRITICAL or HIGH vulnerabilities.
#
# --- Credential safety (do not remove) ---
# - DOCKERHUB_TOKEN: used ONLY in "Login to Docker Hub" via docker/login-action (never echo/log).
# - DOCKERHUB_USERNAME: variable (non-secret), safe in env and Summary.
# - Deploy runs on a self-hosted runner on the target VM (label `deploy`). No SSH from GitHub to the server.
# - DOCKERHUB_TOKEN in deploy: only for docker/login-action if you need authenticated pull (private image or Hub rate limits).
# - No step must echo, print, or pass secrets to scripts. GitHub masks secrets in logs when present.
on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "docs/**"
  workflow_dispatch: {}   # Permite rodar manualmente (Actions → Build, Scan & Publish → Run workflow) para testar Docker Hub

permissions:
  contents: read
  security-events: write   # upload Trivy SARIF to GitHub Code Scanning

# ──────────────────────────────────────────────────────────────────────────────
jobs:
  build-scan-push:
    name: Construct → Build → Trivy Scan → Push Docker Hub
    runs-on: ubuntu-latest

    # Image name follows the repository name automatically so that when a
    # new repo is created from this template (e.g. "my-org/auth-api") the
    # image is published as "DOCKERHUB_USERNAME/auth-api".
    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Construct Dockerfile and .dockerignore ────────────────────────────
      # The project contains only application code. The Dockerfile and all
      # Docker infrastructure are constructed here by CI/CD so the developer
      # never needs Docker-specific files in the repository.
      # To customise the image (base, ports, workers), edit this step.
      - name: Construct Docker context
        run: |
          cat > Dockerfile << 'DOCKERFILE'
          # ── Stage 1: builder ────────────────────────────────────────────────
          FROM python:3.11-slim AS builder
          WORKDIR /build
          RUN apt-get update && apt-get install -y --no-install-recommends \
              gcc \
              && rm -rf /var/lib/apt/lists/*
          COPY backend/requirements.txt .
          RUN python -m venv /opt/venv \
              && /opt/venv/bin/pip install --upgrade pip \
              && /opt/venv/bin/pip install --no-cache-dir -r requirements.txt

          # ── Stage 2: runtime ─────────────────────────────────────────────
          FROM python:3.11-slim AS runtime
          LABEL org.opencontainers.image.title="${{ github.event.repository.name }}" \
                org.opencontainers.image.revision="${{ github.sha }}" \
                org.opencontainers.image.source="https://github.com/${{ github.repository }}"
          COPY --from=builder /opt/venv /opt/venv
          ENV PATH="/opt/venv/bin:$PATH"
          WORKDIR /app
          COPY backend/app ./app
          RUN groupadd --gid 1001 appgroup \
              && useradd --uid 1001 --gid appgroup --no-create-home appuser \
              && chown -R appuser:appgroup /app
          USER appuser
          EXPOSE 5000
          CMD ["gunicorn", "--bind", "0.0.0.0:5000", "--workers", "2", "--timeout", "30", "app.main:app"]
          DOCKERFILE

          cat > .dockerignore << 'DOCKERIGNORE'
          .git
          .gitignore
          __pycache__
          *.pyc
          *.pyo
          .mypy_cache
          .ruff_cache
          .venv
          venv
          .env
          *.env
          backend/tests/
          backend/requirements-dev.txt
          .github/
          *.md
          .pre-commit-config.yaml
          .cursor/
          .vscode/
          DOCKERIGNORE

      # ── Docker Buildx ─────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build (do NOT push yet — Trivy must scan first) ───────────────────
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy — vulnerability scan (container; evita falha de install da trivy-action) ──
      - name: Trivy — scan image (SARIF upload)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD":/out \
            aquasec/trivy:0.63.0 image \
            --format sarif --output /out/trivy-results.sarif \
            --severity CRITICAL,HIGH --ignore-unfixed \
            --skip-version-check --scanners vuln \
            ${{ env.IMAGE_NAME }}:latest

      - name: Upload Trivy SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: success()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

      # Em workflow_dispatch (run manual) usa exit-code 0 para permitir validar push; em push para main usa 1 (bloqueia).
      - name: Trivy — fail on CRITICAL/HIGH (blocking gate before push)
        run: |
          EXIT_CODE=${{ github.event_name == 'workflow_dispatch' && '0' || '1' }}
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.63.0 image \
            --format table --exit-code "$EXIT_CODE" \
            --severity CRITICAL,HIGH --ignore-unfixed \
            --skip-version-check \
            --scanners vuln \
            ${{ env.IMAGE_NAME }}:latest

      # ── Login & Push (only if Trivy passes) ───────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Registry: https://hub.docker.com/r/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tags: \`latest\`, \`sha-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy on self-hosted runner (VM)
    runs-on: [self-hosted, deploy]
    needs: build-scan-push
    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
      SHA: ${{ github.sha }}
      APP_NAME: ${{ github.event.repository.name }}
    steps:
      # Login evita rate limit anónimo do Docker Hub e permite imagens privadas.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image and restart container
        run: |
          set -eu
          docker pull "${IMAGE_NAME}:sha-${SHA}"
          docker stop "${APP_NAME}" 2>/dev/null || true
          docker rm "${APP_NAME}" 2>/dev/null || true
          docker run -d --name "${APP_NAME}" --restart unless-stopped -p 5000:5000 \
            "${IMAGE_NAME}:sha-${SHA}"
          sleep 3
          curl -fsS http://127.0.0.1:5000/health
