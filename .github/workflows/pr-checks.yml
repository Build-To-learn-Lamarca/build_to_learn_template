name: PR Checks

# Triggered on every pull request targeting main.
# ALL jobs must pass before a PR can be merged (enforced via branch protection
# → Required status checks: lint-test, sast, dast).
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "docs/**"

permissions:
  contents: read
  pull-requests: write    # ZAP posts findings as a comment
  security-events: write  # upload SARIF to GitHub Code Scanning

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint & Test ──────────────────────────────────────────────────────────
  lint-test:
    name: Lint & Test (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Ruff — lint
        run: ruff check backend/

      - name: mypy — type check
        run: mypy --config-file pyproject.toml

      - name: pytest — run tests with coverage
        run: |
          pytest \
            --cov=backend/app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.run_id }}
          path: coverage.xml
          retention-days: 7
          overwrite: true

  # ── 2. SAST — Bandit (Python static security analysis) ─────────────────────
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[sarif]==1.7.10

      - name: Run Bandit — SARIF export for Code Scanning
        run: |
          bandit \
            -r backend/app \
            -ll -iii \
            -f sarif \
            -o bandit-results.sarif \
            || true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Fail on HIGH severity findings
        run: bandit -r backend/app -lll --confidence-level high

  # ── 3. DAST — OWASP ZAP Baseline Scan ──────────────────────────────────────
  dast:
    name: DAST (OWASP ZAP Baseline)
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Construct Dockerfile and .dockerignore ────────────────────────────
      # The project contains only application code. The Docker context is
      # constructed here by CI/CD so the project stays free of infrastructure
      # files. Adjust the image stages if your base image or runtime changes.
      - name: Construct Docker context
        run: |
          cat > Dockerfile << 'DOCKERFILE'
          # ── Stage 1: builder ────────────────────────────────────────────────
          FROM python:3.11-slim AS builder
          WORKDIR /build
          RUN apt-get update && apt-get install -y --no-install-recommends \
              gcc \
              && rm -rf /var/lib/apt/lists/*
          COPY backend/requirements.txt .
          RUN python -m venv /opt/venv \
              && /opt/venv/bin/pip install --upgrade pip \
              && /opt/venv/bin/pip install --no-cache-dir -r requirements.txt

          # ── Stage 2: runtime ─────────────────────────────────────────────
          FROM python:3.11-slim AS runtime
          LABEL org.opencontainers.image.title="${{ github.event.repository.name }}" \
                org.opencontainers.image.source="https://github.com/${{ github.repository }}"
          COPY --from=builder /opt/venv /opt/venv
          ENV PATH="/opt/venv/bin:$PATH"
          WORKDIR /app
          COPY backend/app ./app
          RUN groupadd --gid 1001 appgroup \
              && useradd --uid 1001 --gid appgroup --no-create-home appuser \
              && chown -R appuser:appgroup /app
          USER appuser
          EXPOSE 5000
          CMD ["gunicorn", "--bind", "0.0.0.0:5000", "--workers", "2", "--timeout", "30", "app.main:app"]
          DOCKERFILE

          cat > .dockerignore << 'DOCKERIGNORE'
          .git
          .gitignore
          __pycache__
          *.pyc
          *.pyo
          .mypy_cache
          .ruff_cache
          .venv
          venv
          .env
          *.env
          backend/tests/
          backend/requirements-dev.txt
          .github/
          *.md
          .pre-commit-config.yaml
          .cursor/
          .vscode/
          DOCKERIGNORE

      - name: Build image for DAST
        run: docker build -t app-dast:pr .

      - name: Start application container
        run: |
          docker run -d \
            --name app-dast \
            -p 5000:5000 \
            -e LOG_LEVEL=ERROR \
            app-dast:pr

      - name: Wait for application to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
              echo "App is ready."
              exit 0
            fi
            echo "Waiting for app... ($i/20)"
            sleep 3
          done
          echo "App did not start in time."
          docker logs app-dast
          exit 1

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://localhost:5000"
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-baseline-report
          cmd_options: "-I"

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report-${{ github.run_id }}
          path: report_html.html
          retention-days: 7
          overwrite: true

      - name: Stop application container
        if: always()
        run: docker stop app-dast && docker rm app-dast
